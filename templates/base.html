<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}GEDPub - Painel{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background-color: #f8f9fa;
    }
    .sidebar {
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      background-color: #343a40;
      color: white;
      padding-top: 1rem;
    }
    .sidebar a {
      color: white;
      display: block;
      padding: 0.75rem 1rem;
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar a.active {
      background-color: #495057;
    }
    .main {
      margin-left: 250px;
      padding: 2rem;
    }
    .navbar-custom {
      margin-left: 250px;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <h5 class="text-center">GEDPub</h5>
    <a href="/" class="{% if request.path == '/' %}active{% endif %}"><i class="bi bi-house"></i> Início</a>    
    <a href="/processos/lista/" class="{% if '/processos' in request.path %}active{% endif %}">
    <a href="{% url 'lista_processos' %}" class="{% if '/processos/lista/' in request.path %}active{% endif %}">
        <i class="bi bi-journal-text"></i> Lista de Processos
      </a>
      <a href="{% url 'novo_processo' %}" class="{% if '/processos/novo/' in request.path %}active{% endif %}">
        <i class="bi bi-plus-circle"></i> Novo Processo
    </a>
      
    <a href="/api/documentos/" target="_blank"><i class="bi bi-paperclip"></i> Documentos (API)</a>
    <a href="/admin/" target="_blank"><i class="bi bi-gear"></i> Admin</a>
  </div>

  
  <div class="main">
    {% block content %}
    {% endblock %}
  </div>

</body>
</html>
